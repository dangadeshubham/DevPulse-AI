name: DevPulse Fresh Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytz

      - name: Debug check
        run: python -c "import pytz; print('pytz OK')"

      - name: Run script
        run: python commit.py

      - name: Push changes
        run: |
          git config user.name "Shubham Dangade"
          git config user.email "shubhamdangade01@gmail.com"
          git add .
          git commit -m "Auto commit DevPulse" || echo "No changes"
          git push
