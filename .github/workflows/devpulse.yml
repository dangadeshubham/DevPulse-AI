name: DevPulse Fresh Bot

on:
  schedule:
    - cron: '0 4 * * *'   # 9:30 AM IST
    - cron: '30 7 * * *'  # 1:00 PM IST
    - cron: '0 12 * * *'  # 5:30 PM IST
    - cron: '30 15 * * *' # 9:00 PM IST
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug check
        run: python -c "import pytz; print('pytz OK')"

      - name: Run commit script
        run: python commit.py

      - name: Commit & Push (FINAL FIXED VERSION)
        run: |
          git config --global user.name "Shubham Dangade"
          git config --global user.email "shubhamdangade01@gmail.com"

          git add .
          git commit -m "Auto commit by DevPulse" || echo "No changes"

          git pull origin main --rebase

          git push origin main
