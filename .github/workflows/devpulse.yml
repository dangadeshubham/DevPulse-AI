name: DevPulse Manual Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run commit script
        run: python commit.py

      - name: Commit & Push
        run: |
          git config --global user.name "Shubham Dangade"
          git config --global user.email "shubhamdangade01@gmail.com"

          git add .
          git commit -m "Manual DevPulse commit" || echo "No changes"

          git pull origin main --rebase
          git push origin main
