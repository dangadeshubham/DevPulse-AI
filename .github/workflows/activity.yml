name: DevPulse Activity Bot

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify pytz installed
        run: python -c "import pytz; print('pytz installed')"

      - name: Run commit script
        run: python commit.py

      - name: Commit and push
        run: |
          git config --global user.name "Shubham Dangade"
          git config --global user.email "shubhamdangade01@gmail.com"
          git add .
          git commit -m "Automated commit by DevPulse AI" || echo "No changes"
          git push
